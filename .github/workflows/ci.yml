name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  sim-purity:
    name: Simulation purity check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan src/Simulation for forbidden constructs
        run: bash scripts/check-sim-purity.sh

  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: sim-purity
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore WarOfKings.sln

      - name: Build
        run: dotnet build WarOfKings.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test WarOfKings.sln --no-build --configuration Release --verbosity normal

  determinism-check:
    name: Cross-platform determinism check
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Determinism tests
        run: dotnet test tests/Determinism/Determinism.Tests.csproj --configuration Release

      # TODO(, M1): once the cross-platform replay-hash test exists,
      # download the hash artifacts from each OS in the test matrix and assert
      # they match. Until then, the per-OS test job above covers same-platform determinism.
